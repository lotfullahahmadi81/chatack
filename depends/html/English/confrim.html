<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Confirmation</title>
    <link rel="stylesheet" href="../../css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../css/confrim.css" />
    <link rel="icon" href="../../photos/web_logo.png" />
  </head>
  <body>
    <div class="loader" id="loader">
      <div class="spinner-grow blue" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="spinner-grow text" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="spinner-grow white" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="spinner-grow blue" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="spinner-grow text" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="spinner-grow white" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="spinner-grow blue" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <div class="spinner-grow text" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <div style="display: none" id="final" class="card btn-outline-custom bd">
      <div class="card">
        <div class="success-icon">&#10004;</div>
        <h3 class="mb-3 text-success">
          Your requiest has been submited successfully!
        </h3>
        <p>your trip will confrim by chatack dirvers!</p>
        <a href="../../../index.html" class="btn btn-primary btn-home">Home</a>
      </div>
    </div>
    <script src="../../js/confirm.js"></script>
  </body>
</html>
